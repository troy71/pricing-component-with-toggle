<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">

  <title>Frontend Mentor | Pricing component with toggle</title>


</head>

<body>

  <img src="./images/bg-top.svg" alt="bg-top" class="top-img">
  <img src="./images/bg-bottom.svg" alt="bg-bottom" class="bottom-img">
  <main>


    <section>
      <div class="title">
        <h2>Our Pricing</h2>
      </div>

      <input type="checkbox" id="pricing-toggle" class="pricing-toggle-input"
        title="Toggle between annual and monthly pricing">

      <div class="toggle">
        <div class="annually">Annually</div>
        <label class="switch" for="pricing-toggle">
          <span class="slider round"></span>
        </label>
        <div class="monthly">Monthly</div>
      </div>



      <div class="card__container">
        <div class="card card__basic">
          <div class="card__heading">
            <h3>Basic</h3>
          </div>

          <div class="card__price">
            <p class="card__price__monthly"><span class="card__currency">$</span>19.99</p>
            <p class="card__price__annually"><span class="card__currency">$</span>199.99</p>

          </div>
          <hr>
          <div class="card__storage">500 GB Storage</div>
          <hr>
          <div class="card__users">2 Users Allowed</div>
          <hr>
          <div class="card__send">Send up to 3 GB</div>
          <hr>
          <button type="submit" class="card__learn__more">Learn More</button>

        </div>

        <div class="card card__professional">
          <div class="card__heading">
            <h3>Professional</h3>
          </div>

          <div class="card__price">
            <p class="card__price__monthly"><span class="card__currency">$</span>24.99</p>
            <p class="card__price__annually"><span class="card__currency">$</span>249.99</p>

          </div>
          <hr>

          <div class="card__storage">1 TB Storage</div>
          <hr>
          <div class="card__users">5 Users Allowed</div>
          <hr>
          <div class="card__send">Send up to 10 GB</div>
          <hr>
          <button type="submit" class="card__learn__more">Learn More</button>
        </div>

        <div class="card card__master">
          <div class="card__heading">
            <h3>Master</h3>
          </div>

          <div class="card__price">
            <p class="card__price__monthly"><span class="card__currency">$</span>39.99</p>
            <p class="card__price__annually"><span class="card__currency">$</span>399.99</p>
          </div>
          <hr>
          <div class="card__storage">2 TB Storage</div>
          <hr>
          <div class="card__users">10 Users Allowed</div>
          <hr>
          <div class="card__send">Send up to 20 GB</div>
          <hr>
          <button type="submit" class="card__learn__more">Learn More</button>
        </div>
      </div>

    </section>
  </main>

</body>

</html>
